<!DOCTYPE html>
<html>
<head>
  <title>Scratch & Win</title>
</head>
<body style="text-align:center; font-family:Arial">

<h1>🎉 Scratch & Win Game 🎉</h1>
<p>Scratch below and try your luck!</p>

<button onclick="win()">SCRATCH</button>

<h2 id="result"></h2>

<script>
function win(){
  let arr = ["🎁 You Won ₹50", "😢 Better luck next time", "🎉 You Won ₹100"];
  
  // Result show karo
  document.getElementById("result").innerHTML =
  arr[Math.floor(Math.random()*arr.length)];

  // 2 second baad ad trigger
  setTimeout(function(){
    document.body.click();
  }, 2000);
}
</script>

</body>
</html>
