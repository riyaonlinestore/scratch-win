<!DOCTYPE html>
<html>
<head>
  <title>Claim Reward</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Adsterra script -->
  <script src="https://pl29008142.profitablecpmratenetwork.com/23/c0/d9/23c0d9c59bb2e634cb9f66d22e11eb43.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background: linear-gradient(135deg,#a1c4fd,#c2e9fb);
    }

    .box {
      background:white;
      padding:30px;
      border-radius:15px;
      text-align:center;
      box-shadow:0 0 20px rgba(0,0,0,0.2);
      width:90%;
      max-width:300px;
    }

    button {
      padding:15px 30px;
      background:green;
      color:white;
      border:none;
      border-radius:10px;
      font-size:18px;
      margin-top:15px;
    }

    #msg {
      margin-top:20px;
      font-size:18px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🎁 Claim Your Reward</h2>
  <p>Click below to reveal</p>

  <button onclick="claim()">CLAIM</button>

  <div id="msg"></div>
  <p style="font-size:12px; color:#777;">*Just for fun 🎮</p>
</div>

<script>
function claim(){
  let arr = ["🎉 Surprise Reward!", "😢 Try Again Tomorrow", "🎁 You got something!"];
  let result = arr[Math.floor(Math.random()*arr.length)];

  document.getElementById("msg").innerHTML = result;
}
</script>

</body>
</html>
