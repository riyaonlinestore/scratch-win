<!DOCTYPE html>
<html>
<head>
  <title>Claim Your Reward</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Adsterra script -->

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 30px;
      background: linear-gradient(135deg,#89f7fe,#66a6ff);
    }
    button {
      padding: 15px 30px;
      background: green;
      color: white;
      border: none;
      border-radius:10px;
      font-size:18px;
    }
    #msg {
      margin-top:20px;
      font-size:20px;
    }
  </style>
</head>

<body>

<h2>🎉 Claim Your Reward 🎉</h2>
<p>Click below to reveal your reward</p>

<button onclick="claim()">CLAIM</button>

<div id="msg"></div>

<script>
function claim(){
  let arr = ["🎁 You got a surprise!", "😄 Try again tomorrow!", "🎉 Lucky day!"];
  
  let result = arr[Math.floor(Math.random()*arr.length)];
  document.getElementById("msg").innerHTML = result;
}
</script>

<p style="font-size:12px; color:#555; margin-top:20px;">
*Just for fun 🎮
</p>

</body>
